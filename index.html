<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Produção e Movimentos</title>

    <!-- CDN Oficial do Chart.js v4 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f9; color: #333; }
        h1 { margin-bottom: 5px; }
        .subtitle { color: #666; margin-bottom: 25px; }
        .charts-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; width: 100%; }
        .chart-container { flex: 1; min-width: 320px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: 320px; position: relative; }
        .table-container { overflow-x: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: center; ; vertical-align: middle; border-bottom: 1px solid #ddd; white-space: nowrap; }
        th { background-color: #007bff; color: white; position: sticky; top: 0; }
        tr:hover { background-color: #f8f9fa; }
        .status-banner { background-color: #e2e3e5; padding: 10px 15px; border-radius: 5px; display: inline-block; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

<h1>Painel de Controlo de Movimentos</h1>
<p class="subtitle">Dados integrados em tempo real a partir da aplicação Android.</p>

<div id="status" class="status-banner">A carregar dados do Google Sheets...</div>

<div class="charts-row">
    <div class="chart-container">
        <canvas id="meuGraficoMovimentos"></canvas>
    </div>
    <div class="chart-container">
        <canvas id="meuGraficoQuantidades"></canvas>
    </div>
    <div class="chart-container">
        <canvas id="meuGraficoVinhoQuantidades"></canvas>
    </div>
</div>

<div class="table-container">
    <table id="dados-tabela" style="display: none;">
        <thead id="tabela-head"></thead>
        <tbody id="tabela-body"></tbody>
    </table>
</div>

<script>
    const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSPELKzLQ0TqE8kSMJ6qfUO-Wj2PXFbNI_OlWLiwE_5k8NKHGtCTe3Orp4TChxRp2dipaVlHhi0YPc8/pub?gid=0&single=true&output=csv"
    let graficoMovimentos = null;
    let graficoQuantidades = null;
    let graficoVinhoQuantidades = null;

    async function carregarDados() {
        try {
            const resposta = await fetch(urlCSV + "&cacheBuster=" + new Date().getTime());
            const textoCSV = await resposta.text();
            const linhasBrutas = textoCSV.split(/\r?\n/);

            if (linhasBrutas.length <= 1) {
                document.getElementById('status').innerText = "O Google Sheets respondeu mas não tem dados.";
                return;
            }

            const separador = textoCSV.includes(";") ? ";" : ",";
            const linhas = [];
            for(let i = 0; i < linhasBrutas.length; i++) {
                if(linhasBrutas[i].trim() !== "") {
                    linhas.push(linhasBrutas[i].split(separador).map(c => c.replace(/"/g, '').trim()));
                }
            }

            const cabecalho = linhas[0];
            const head = document.getElementById('tabela-head');
            const body = document.getElementById('tabela-body');

            let htmlHead = "<tr>";
            for(let i = 0; i < cabecalho.length; i++) {
                htmlHead += "<th>" + cabecalho[i] + "</th>";
            }
            htmlHead += "</tr>";
            head.innerHTML = htmlHead;

            let htmlBody = "";
            for (let i = linhas.length - 1; i >= 1; i--) {
                htmlBody += "<tr>";
                for(let j = 0; j < linhas[i].length; j++) {
                    let texto = linhas[i][j];
                    if(texto === "Selecione...") texto = "";
                    htmlBody += "<td>" + texto + "</td>";
                }
                htmlBody += "</tr>";
            }
            body.innerHTML = htmlBody;

            // 1. ÍNDICES FIXOS CONTROLADOS (Evita erros por quebras de texto)
            const colMovimento = 4;   // Tipo Movimento
            const colVinho = 10;      // Tipo Vinho (Índice 11 da lista)
            const colQuantidade = 13; // Qt (L) Trasfegada (L)

            const contagemTipos = {};
            const somaLitros = {};
            const somaLitrosVinho = {};

            // 2. PROCESSAMENTO E SOMA DE DADOS COM AS CORREÇÕES DE SINTAXE
            for (let i = 1; i < linhas.length; i++) {
                if (!linhas[i] || linhas[i].length <= 13) continue;

                let tipo = linhas[i][colMovimento] ? linhas[i][colMovimento].trim() : "";
                let vinho = linhas[i][colVinho] ? linhas[i][colVinho].trim() : "";
                let qtdTexto = linhas[i][colQuantidade] ? linhas[i][colQuantidade].trim() : "";

                // Remove espaços invisíveis ou formatações especiais do Sheets
                let qtdLimpa = qtdTexto.replace(/[^0-9,.]/g, '').replace(',', '.');
                let valor = parseFloat(qtdLimpa) || 0;

                if (tipo !== "" && tipo !== "Selecione...") {
                    // CORREÇÃO 2: Retificados os parênteses por parênteses retos [tipo]
                    contagemTipos[tipo] = (contagemTipos[tipo] || 0) + 1;
                    somaLitros[tipo] = (somaLitros[tipo] || 0) + valor;
                }

                if (vinho !== "" && vinho !== "Selecione...") {
                    somaLitrosVinho[vinho] = (somaLitrosVinho[vinho] || 0) + valor;
                }
            }

            // 3. ESTRUTURAÇÃO RIGOROSA DOS EIXOS
            let labelsMov = ["Trasfega", "Entrada"];
            let dadosContagem = labelsMov.map(k => contagemTipos[k] || 0);
            let dadosLitros = labelsMov.map(k => somaLitros[k] || 0);

            if (labelsMov.length === 0) {
                labelsMov = ["Sem Movimentos"];
                dadosContagem = [];
                dadosLitros = [];
            }

            // CORREÇÃO 1: Removida a segunda declaração duplicada das linhas 156-157
            let labelsVinho = Object.keys(somaLitrosVinho).filter(k => k !== "");
            let dadosVinhoLitros = labelsVinho.map(k => somaLitrosVinho[k] || 0);

            if (labelsVinho.length === 0) {
                labelsVinho = ["Sem Vinhos"];
                dadosVinhoLitros = [];
            }

            if (typeof Chart !== 'undefined') {
                // Gráfico 1: Movimentos (Azul)
                const ctxMov = document.getElementById('meuGraficoMovimentos').getContext('2d');
                if (graficoMovimentos) graficoMovimentos.destroy();
                graficoMovimentos = new Chart(ctxMov, {
                    type: 'bar',
                    data: {
                        labels: labelsMov,
                        datasets: [{
                            label: 'Nº Total de Movimentos por Tipo',
                            data: dadosContagem,
                            backgroundColor: 'rgba(0, 123, 255, 0.6)',
                            borderColor: '#007bff',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
                    }
                });

                // Gráfico 2: Quantidades por Movimento (Verde)
                const ctxQtd = document.getElementById('meuGraficoQuantidades').getContext('2d');
                if (graficoQuantidades) graficoQuantidades.destroy();
                graficoQuantidades = new Chart(ctxQtd, {
                    type: 'bar',
                    data: {
                        labels: labelsMov,
                        datasets: [{
                            label: 'Quantidade Total Trasfegada (L)',
                            data: dadosLitros,
                            backgroundColor: 'rgba(40, 167, 69, 0.6)',
                            borderColor: '#28a745',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: true } }
                    }
                });

                // Gráfico 3: Quantidades por Tipo de Vinho
              const ctxVinho = document.getElementById('meuGraficoVinhoQuantidades').getContext('2d');
                if (graficoVinhoQuantidades) graficoVinhoQuantidades.destroy();

                // Atribuição de bordeaux para Tinto e rosa para Rosé
                const coresFundo = labelsVinho.map(v => {
                    let n = v.toLowerCase().trim();
                    if (n.includes("tinto")) return 'rgba(128, 0, 32, 0.7)';
                    if (n.includes("rosé") || n.includes("rose")) return 'rgba(255, 182, 193, 0.7)';
                    return 'rgba(153, 102, 255, 0.6)';
                });

                const coresBorda = labelsVinho.map(v => {
                    let n = v.toLowerCase().trim();
                    if (n.includes("tinto")) return '#4A0014';
                    if (n.includes("rosé") || n.includes("rose")) return '#FFB6C1';
                    return '#9966ff';
                });

                graficoVinhoQuantidades = new Chart(ctxVinho, {
                    type: 'bar',
                    data: {
                        labels: labelsVinho,
                        datasets: [{
                            label: 'Quantidade Total por Tipo de Vinho (L)',
                            data: dadosVinhoLitros,
                            backgroundColor: coresFundo,
                            borderColor: coresBorda,
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: true } }
                    }
                });
            }

            document.getElementById('status').style.display = 'none';
            document.getElementById('dados-tabela').style.display = 'table';

        } catch (erro) {
            console.error("Erro no processamento:", erro);
            document.getElementById('status').innerText = "Erro ao renderizar painel visual.";
        }
    }

    carregarDados();
    setInterval(carregarDados, 1800000);
</script>

</body>
</html>
