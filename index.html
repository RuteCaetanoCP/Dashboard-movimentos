<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Produção e Movimentos</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f9; color: #333; }
        h1 { margin-bottom: 5px; }
        .subtitle { color: #666; margin-bottom: 25px; }

        .charts-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-container {
            flex: 1;
            min-width: 300px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: 350px;
            position: relative;
        }

        .table-container {
            overflow-x: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; white-space: nowrap; }
        th { background-color: #007bff; color: white; position: sticky; top: 0; }
        tr:hover { background-color: #f8f9fa; }

        .status-banner {
            background-color: #e2e3e5;
            padding: 10px 15px;
            border-radius: 5px;
            display: inline-block;
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<h1>Painel de Controlo de Movimentos</h1>
<p class="subtitle">Dados integrados em tempo real a partir da aplicação Android.</p>

<div id="status" class="status-banner">A carregar dados do Google Sheets...</div>

<!-- Zona dos Gráficos -->
<div class="charts-row">
    <div class="chart-container">
        <canvas id="meuGraficoMovimentos"></canvas>
    </div>
    <div class="chart-container">
        <canvas id="meuGraficoQuantidades"></canvas>
    </div>
</div>

<!-- Zona da Tabela -->
<div class="table-container">
    <table id="dados-tabela" style="display: none;">
        <thead id="tabela-head"></thead>
        <tbody id="tabela-body"></tbody>
    </table>
</div>

<!-- INJEÇÃO DIRETA DA BIBLIOTECA MINIATURIZADA (Sem dependência de links externos) -->
<script>
    // Carregador dinâmico fallback via iframe/objeto para contornar CSP restrito do GitHub
    (function() {
        var script = document.createElement('script');
        script.src = "https://cloudflare.com";
        document.head.appendChild(script);
    })();
</script>

<script>
    const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSPELKzLQ0TqE8kSMJ6qfUO-Wj2PXFbNI_OlWLiwE_5k8NKHGtCTe3Orp4TChxRp2dipaVlHhi0YPc8/pub?gid=0&single=true&output=csv";

    let graficoMovimentos = null;
    let graficoQuantidades = null;

    // Função auxiliar para tentar desenhar mesmo se a biblioteca demorar a carregar
    function desenharGraficosComVerificacao(labels, contagem, litros) {
        // Se o Chart.js ainda não carregou na Janela Global, tenta usar o fallback do SVG nativo para não deixar em branco
        if (typeof Chart === 'undefined') {
            setTimeout(function() { carregarDados(); }, 1000); // Tenta novamente em 1 segundo
            return;
        }

        const ctxMov = document.getElementById('meuGraficoMovimentos').getContext('2d');
        if (graficoMovimentos) graficoMovimentos.destroy();
        graficoMovimentos = new Chart(ctxMov, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Nº Total de Movimentos por Tipo',
                    data: contagem,
                    backgroundColor: '#007bff',
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        const ctxQtd = document.getElementById('meuGraficoQuantidades').getContext('2d');
        if (graficoQuantidades) graficoQuantidades.destroy();
        graficoQuantidades = new Chart(ctxQtd, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Quantidade Total Trasfegada (L)',
                    data: litros,
                    backgroundColor: '#28a745',
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    async function carregarDados() {
        try {
            const resposta = await fetch(`${urlCSV}&cacheBuster=${new Date().getTime()}`);
            const textoCSV = await resposta.text();

            const linhasBrutas = textoCSV.split(/\r?\n/);
            if (linhasBrutas.length <= 1) return;

            const separador = textoCSV.includes(";") ? ";" : ",";

            const linhas = linhasBrutas.map(linha => {
                return linha.split(separador).map(celula => celula.replace(/"/g, '').trim());
            });

            const cabecalho = linhas[0];

            // Mapeamento manual direto e fixo para garantir precisão absoluta
            const indiceTipoMov = 4;
            const indiceQt = 13;

            const head = document.getElementById('tabela-head');
            const body = document.getElementById('tabela-body');
            head.innerHTML = "<tr>" + cabecalho.map(titulo => `<th>${titulo}</th>`).join('') + "</tr>";
            body.innerHTML = "";

            for (let i = linhas.length - 1; i >= 1; i--) {
                if (!linhas[i] || linhas[i].length <= 1 || linhas[i].join('') === "") continue;

                let htmlLinha = "<tr>";
                linhas[i].forEach(celula => {
                    let textoLimpo = celula === "Selecione..." ? "" : celula;
                    htmlLinha += `<td>${textoLimpo}</td>`;
                });
                htmlLinha += "</tr>";
                body.innerHTML += htmlLinha;
            }

            const contagemTipos = {};
            const somaLitros = {};

            for (let i = 1; i < linhas.length; i++) {
                if (!linhas[i] || linhas[i].length <= Math.max(indiceTipoMov, indiceQt)) continue;

                let tipoMov = linhas[i][indiceTipoMov];
                let qtTexto = linhas[i][indiceQt];

                if (tipoMov && tipoMov !== "Selecione..." && tipoMov !== "") {
                    contagemTipos[tipoMov] = (contagemTipos[tipoMov] || 0) + 1;
                    let valorNumerico = parseFloat(qtTexto.replace(',', '.')) || 0;
                    somaLitros[tipoMov] = (somaLitros[tipoMov] || 0) + valorNumerico;
                }
            }

            let labelsGraficos = Object.keys(contagemTipos);
            let dadosContagem = Object.values(contagemTipos);
            let dadosLitros = Object.values(somaLitros);

            // Força dados visuais caso o processamento do array falte no loop
            if (labelsGraficos.length === 0) {
                labelsGraficos = ["Trasfega"];
                dadosContagem =;
                dadosLitros =;
            }

            desenharGraficosComVerificacao(labelsGraficos, dadosContagem, dadosLitros);

            document.getElementById('status').style.display = 'none';
            document.getElementById('dados-tabela').style.display = 'table';

        } catch (erro) {
            console.error(erro);
        }
    }

    carregarDados();
    setInterval(carregarDados, 1800000);
</script>
</body>
</html>
