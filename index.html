<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Produção e Movimentos</title>

    <!-- CDN Oficial do Chart.js v4 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f9; color: #333; }
        h1 { margin-bottom: 5px; }
        .subtitle { color: #666; margin-bottom: 25px; }
        .charts-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; width: 100%; }
        .chart-container { flex: 1; min-width: 320px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: 320px; position: relative; }
        .table-container { overflow-x: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; white-space: nowrap; }
        th { background-color: #007bff; color: white; position: sticky; top: 0; }
        tr:hover { background-color: #f8f9fa; }
        .status-banner { background-color: #e2e3e5; padding: 10px 15px; border-radius: 5px; display: inline-block; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

<h1>Painel de Controlo de Movimentos</h1>
<p class="subtitle">Dados integrados em tempo real a partir da aplicação Android.</p>

<div id="status" class="status-banner">A carregar dados do Google Sheets...</div>

<div class="charts-row">
    <div class="chart-container">
        <canvas id="meuGraficoMovimentos"></canvas>
    </div>
    <div class="chart-container">
        <canvas id="meuGraficoQuantidades"></canvas>
    </div>
</div>

<div class="table-container">
    <table id="dados-tabela" style="display: none;">
        <thead id="tabela-head"></thead>
        <tbody id="tabela-body"></tbody>
    </table>
</div>

<script>
    const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSPELKzLQ0TqE8kSMJ6qfUO-Wj2PXFbNI_OlWLiwE_5k8NKHGtCTe3Orp4TChxRp2dipaVlHhi0YPc8/pub?gid=0&single=true&output=csv";

    let graficoMovimentos = null;
    let graficoQuantidades = null;

    async function carregarDados() {
        try {
            const resposta = await fetch(urlCSV + "&cacheBuster=" + new Date().getTime());
            const textoCSV = await resposta.text();
            const linhasBrutas = textoCSV.split(/\r?\n/);

            if (linhasBrutas.length <= 1) {
                document.getElementById('status').innerText = "O Google Sheets respondeu mas não tem dados.";
                return;
            }

            const separador = textoCSV.includes(";") ? ";" : ",";
            const linhas = [];
            for(let i = 0; i < linhasBrutas.length; i++) {
                if(linhasBrutas[i].trim() !== "") {
                    linhas.push(linhasBrutas[i].split(separador).map(c => c.replace(/"/g, '').trim()));
                }
            }

            const cabecalho = linhas[0];
            const head = document.getElementById('tabela-head');
            const body = document.getElementById('tabela-body');

            // Constroi o cabeçalho de forma simples e segura
            let htmlHead = "<tr>";
            for(let i = 0; i < cabecalho.length; i++) {
                htmlHead += "<th>" + cabecalho[i] + "</th>";
            }
            htmlHead += "</tr>";
            head.innerHTML = htmlHead;

            // Constroi o corpo da tabela de trás para a frente (mais recentes primeiro)
            let htmlBody = "";
            for (let i = linhas.length - 1; i >= 1; i--) {
                htmlBody += "<tr>";
                for(let j = 0; j < linhas[i].length; j++) {
                    let texto = linhas[i][j];
                    if(texto === "Selecione...") texto = "";
                    htmlBody += "<td>" + texto + "</td>";
                }
                htmlBody += "</tr>";
            }
            body.innerHTML = htmlBody;

           // 1. DESCOBERTA RIGOROSA E EXATA DAS COLUNAS
            let colMovimento = 4; // Valor padrão de segurança
            let colQuantidade = 13; // Valor padrão de segurança

            for(let j = 0; j < cabecalho.length; j++) {
                let nomeCol = cabecalho[j].toString().toLowerCase().trim();

                // Procura exata pelo nome da coluna de movimento
                if(nomeCol.includes("tipo movimento")) {
                    colMovimento = j;
                }
                // Procura exata pelo cabeçalho final de quantidade
                if(nomeCol.includes("qt (l)") || nomeCol.includes("trasfegada (l)")) {
                    colQuantidade = j;
                }
            }

            const contagemTipos = {};
            const somaLitros = {};

            // 2. PROCESSAMENTO SEGURO LINHA A LINHA
            for (let i = 1; i < linhas.length; i++) {
                // Se a linha não tiver dados suficientes para alcançar as colunas necessárias, ignora
                if (!linhas[i] || linhas[i].length <= Math.max(colMovimento, colQuantidade)) continue;

                let tipo = linhas[i][colMovimento];
                let qtdTexto = linhas[i][colQuantidade];

                // Valida se a célula de movimento tem conteúdo real
                if (tipo && tipo.trim() !== "" && tipo !== "Selecione...") {
                    tipo = tipo.trim();

                    // Gráfico 1: Contagem de Movimentos (Azul)
                    contagemTipos[tipo] = (contagemTipos[tipo] || 0) + 1;

                    // Gráfico 2: Soma de Litros (Verde)
                    if (qtdTexto && qtdTexto.trim() !== "") {
                        // Limpeza total de espaços, pontos e formatações de milhar do Sheets
                        let qtdLimpa = qtdTexto.toString()
                            .replace(/\s+/g,'')
                            .replace(/\./g,'')
                            .replace(',', '.');

                        let valor = parseFloat(qtdLimpa);

                        // Garante que só soma se for um número válido e real
                        if (!isNaN(valor) && valor > 0) {
                            somaLitros[tipo] = (somaLitros[tipo] || 0) + valor;
                        }
                    }
                }
            }

            let labelsGraficos = Object.keys(contagemTipos);
            let dadosContagem = Object.values(contagemTipos);
            let dadosLitros = Object.values(somaLitros);

            // CORREÇÃO DA LINHA 130: Arrays vazios válidos [] sem vírgulas soltas
            if (labelsGraficos.length === 0) {
                labelsGraficos = ["Sem Movimentos"];
                dadosContagem = [];
                dadosLitros = [];
            }

            if (typeof Chart !== 'undefined') {
                // Gráfico 1
                const ctxMov = document.getElementById('meuGraficoMovimentos').getContext('2d');
                if (graficoMovimentos) graficoMovimentos.destroy();
                graficoMovimentos = new Chart(ctxMov, {
                    type: 'bar',
                    data: {
                        labels: labelsGraficos,
                        datasets: [{
                            label: 'Nº Total de Movimentos por Tipo',
                            data: dadosContagem,
                            backgroundColor: 'rgba(0, 123, 255, 0.6)',
                            borderColor: '#007bff',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
                    }
                });

                // Gráfico 2
                const ctxQtd = document.getElementById('meuGraficoQuantidades').getContext('2d');
                if (graficoQuantidades) graficoQuantidades.destroy();
                graficoQuantidades = new Chart(ctxQtd, {
                    type: 'bar',
                    data: {
                        labels: labelsGraficos,
                        datasets: [{
                            label: 'Quantidade Total Trasfegada (L)',
                            data: dadosLitros,
                            backgroundColor: 'rgba(40, 167, 69, 0.6)',
                            borderColor: '#28a745',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: true } }
                    }
                });
            }

            document.getElementById('status').style.display = 'none';
            document.getElementById('dados-tabela').style.display = 'table';

        } catch (erro) {
            console.error("Erro no processamento:", erro);
            document.getElementById('status').innerText = "Erro ao renderizar painel visual.";
        }
    }

    carregarDados();
    setInterval(carregarDados, 1800000);
</script>
</body>
</html>
